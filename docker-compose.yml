services:
  options-sync-api:
    build: .
    container_name: options-sync-api
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      BEARER_TOKEN: "CHANGE_ME_SUPER_SECRET_BEARER_KEY"
      DATABASE_PATH: "/data/options.sqlite"
    volumes:
      - options-sync-data:/data

volumes:
  options-sync-data:
